<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Boo Closet - Business Card</title>
  <style>
    @page {
      size: 3.5in 2in;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #18181B;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    /* ---- Business Card Base ---- */
    .card {
      width: 3.5in;
      height: 2in;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ---- FRONT ---- */
    .card-front {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      padding: 20px 24px;
    }

    .card-front .logo-area {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 18px;
    }

    .card-front .logo-area svg {
      width: 42px;
      height: 42px;
    }

    .card-front .info {
      flex: 1;
    }

    .card-front .info .brand {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      font-family: Georgia, serif;
    }

    .card-front .info .subtitle {
      font-size: 9px;
      font-weight: 600;
      color: #A1A1AA;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .card-front .info .tagline {
      font-size: 8px;
      color: #71717A;
      letter-spacing: 2px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .card-front .decor {
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100%;
      background: radial-gradient(circle at 100% 0%, rgba(139,92,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card-front .stars {
      position: absolute;
      top: 12px;
      right: 16px;
      display: flex;
      gap: 4px;
    }

    .card-front .stars span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(139,92,246,0.4);
    }

    .card-front .stars span:nth-child(2) { background: rgba(236,72,153,0.4); }
    .card-front .stars span:nth-child(3) { background: rgba(139,92,246,0.3); }

    /* ---- BACK ---- */
    .card-back {
      background: #18181B;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 24px;
    }

    .card-back .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-back .contact-row:last-child {
      margin-bottom: 0;
    }

    .card-back .contact-row .icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(139,92,246,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-back .contact-row .icon svg {
      width: 11px;
      height: 11px;
    }

    .card-back .contact-row .label {
      font-size: 7px;
      color: #71717A;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .card-back .contact-row .value {
      font-size: 11px;
      color: #E4E4E7;
      font-weight: 500;
    }

    .card-back .contact-row .value a {
      color: #A78BFA;
      text-decoration: none;
    }

    .card-back .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 10px 0;
    }

    .card-back .social {
      display: flex;
      gap: 10px;
    }

    .card-back .social span {
      font-size: 7px;
      color: #52525B;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-back .social span b {
      color: #71717A;
    }

    /* ---- PRINT ---- */
    @media print {
      body { background: white; padding: 0; }
      .card-container { padding: 0; gap: 0; }
      .card { box-shadow: none; page-break-after: always; }
      .card:last-child { page-break-after: avoid; }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <!-- FRONT -->
    <div class="card card-front">
      <div class="logo-area">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(250, 230)" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M0,-80 C0,-80 0,-100 25,-100 C50,-100 50,-80 50,-80"/>
            <path d="M-85,0 L85,0"/>
            <path d="M-85,0 C-100,30 -60,45 -40,20"/>
            <path d="M85,0 C100,30 60,45 40,20"/>
            <path d="M-30,20 L-30,70 C-30,85 -15,85 -15,70 L-15,45 L15,45 L15,70 C15,85 30,85 30,70 L30,20" stroke-width="30"/>
          </g>
        </svg>
      </div>
      <div class="info">
        <div class="brand">Baby Boo</div>
        <div class="subtitle">CLOSET</div>
        <div class="tagline">Children's Wear</div>
      </div>
      <div class="decor"></div>
      <div class="stars">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- BACK -->
    <div class="card card-back">
      <div class="contact-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div>
          <div class="label">Email</div>
          <div class="value"><a href="mailto:hello@babyboocloset.com">hello@babyboocloset.com</a></div>
        </div>
      </div>

      <div class="contact-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div>
          <div class="label">Phone / WhatsApp</div>
          <div class="value"><a href="https://wa.me/233244495254">+233 24 449 5254</a></div>
        </div>
      </div>

      <div class="contact-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            <path d="M2 12h20"/>
          </svg>
        </div>
        <div>
          <div class="label">Website</div>
          <div class="value"><a href="https://babyboocloset.com">babyboocloset.com</a></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="social">
        <span><b>IG</b> @babyboocloset</span>
        <span><b>FB</b> /babyboocloset</span>
      </div>
    </div>
  </div>
</body>
</html>
